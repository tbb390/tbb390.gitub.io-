<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的学习博客 · 每日记录</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(145deg, #edf2f7 0%, #e2e8f0 100%);
        font-family: 'Segoe UI', '微软雅黑', 'PingFang SC', Roboto, system-ui, sans-serif;
        padding: 2rem 1.5rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .box {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(2px);
        padding: 2.5rem 2rem;
        border-radius: 2rem;
        box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.02);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .box:hover {
        box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.18);
    }

    h1 {
        text-align: center;
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #1f4870, #2b5c8a);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.3px;
        margin-bottom: 0.5rem;
    }

    .info {
        text-align: center;
        margin: 1rem 0 1.8rem;
        color: #5b6e8c;
        font-size: 0.95rem;
        background: #f1f5f9;
        display: inline-block;
        width: auto;
        padding: 0.4rem 1.2rem;
        border-radius: 40px;
    }

    .line {
        border-bottom: 2px dashed #e2edf2;
        margin: 1.5rem 0 1.8rem;
    }

    .records-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .record-item {
        background: #ffffff;
        border-radius: 1.2rem;
        transition: all 0.2s ease;
        border: 1px solid #eef2ff;
        overflow: hidden;
    }

    .record-item a {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1.5rem;
        text-decoration: none;
        color: #1e2a3e;
        font-weight: 500;
        font-size: 1.05rem;
        transition: all 0.2s;
    }

    .record-item:hover {
        transform: translateX(5px);
        border-color: #b9d0f0;
        box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.08);
        background: #fefefe;
    }

    .record-item:hover a {
        color: #1f4870;
    }

    .record-icon {
        font-size: 1.5rem;
        opacity: 0.7;
        transition: opacity 0.2s;
    }

    .record-item:hover .record-icon {
        opacity: 1;
    }

    .record-text {
        flex: 1;
        border-left: 2px solid #e2edf2;
        padding-left: 0.75rem;
    }

    .footer-note {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.7rem;
        color: #8ba0bc;
        border-top: 1px solid #eef2ff;
        padding-top: 1rem;
    }

    @media (max-width: 640px) {
        body {
            padding: 1rem;
        }
        .box {
            padding: 1.5rem;
        }
        h1 {
            font-size: 1.6rem;
        }
        .record-item a {
            padding: 0.8rem 1rem;
        }
        .record-text {
            font-size: 0.9rem;
        }
    }
</style>
</head>
<body>
<div class="box">
    <h1>📖 每日学习记录</h1>
    <div style="text-align: center;">
        <div class="info">
            编程 · 刷题 · 专业课 · 日常学习打卡记录
        </div>
    </div>
    <div class="line"></div>

    <div class="records-list">
        <div class="record-item">
            <a href="day1note.html">
                <span class="record-icon">📘</span>
                <span class="record-text">学习记录 第1天</span>
            </a>
        </div>
        <div class="record-item">
            <a href="day2note.html">
                <span class="record-icon">📗</span>
                <span class="record-text">学习记录 第2天</span>
            </a>
        </div>
        <div class="record-item">
            <a href="day3note.html">
                <span class="record-icon">📙</span>
                <span class="record-text">学习记录 第3天</span>
            </a>
        </div>
       <div class="record-item">
            <a href="day4note.html">
                <span class="record-icon">📙</span>
                <span class="record-text">学习记录 第4天</span>
            </a>
        </div>
    </div>

    <div class="footer-note">
        日拱一卒 · 持续更新
    </div>
</div>
</body>
</html>
