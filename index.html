<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的学习博客 · 每日记录</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:linear-gradient(145deg,#edf2f7,#e2e8f0);
    font-family:'Segoe UI','微软雅黑','PingFang SC',system-ui;
    padding:2rem;
}
.box{
    max-width:1000px;
    margin:auto;
    background:#fff;
    border-radius:2rem;
    padding:2rem;
    box-shadow:0 20px 35px -12px rgba(0,0,0,.12);
}
h1{
    text-align:center;
    font-size:2rem;
    margin-bottom:.8rem;
}
.info{
    text-align:center;
    background:#f1f5f9;
    display:inline-block;
    padding:.4rem 1.2rem;
    border-radius:40px;
    margin-bottom:1.2rem;
}
.controls{
    display:flex;
    margin:1.2rem 0 2rem;
}
.controls input{
    flex:1;
    padding:.7rem 1.2rem;
    border-radius:999px;
    border:1px solid #cbd5e1;
    outline:none;
    font-size:.95rem;
}
.week{
    margin-bottom:2.2rem;
}
.week-title{
    font-weight:700;
    margin-bottom:.8rem;
    color:#1f4870;
}
.records-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:1rem;
}
.record-item{
    border:1px solid #e2edf2;
    border-radius:1.2rem;
    background:#fff;
    transition:.2s;
}
.record-item a{
    display:flex;
    align-items:center;
    gap:.6rem;
    padding:1rem;
    text-decoration:none;
    color:#1e2a3e;
}
.record-item:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 18px -8px rgba(0,0,0,.1);
}
.latest{
    border:2px solid #3b82f6;
    background:#eff6ff;
}
.footer-note{
    text-align:center;
    margin-top:2.5rem;
    font-size:.75rem;
    color:#94a3b8;
}
</style>
</head>

<body>
<div class="box">
<h1>📖 每日学习记录</h1>
<div style="text-align:center">
    <div class="info">编程 · 刷题 · 专业课 · 日常学习打卡</div>
</div>

<div class="controls">
    <input id="search" placeholder="搜索：第几天 / 数字">
</div>

<div id="container">

<!-- ====== 你的原始记录（链接完全未改） ====== -->
<div class="record-item"><a href="day1note.html">📘 学习记录 第1天</a></div>
<div class="record-item"><a href="day2note.html">📗 学习记录 第2天</a></div>
<div class="record-item"><a href="day3note.html">📙 学习记录 第3天</a></div>
<div class="record-item"><a href="day4note.html">📙 学习记录 第4天</a></div>
<div class="record-item"><a href="day5note.html">📗 学习记录 第5天</a></div>
<div class="record-item"><a href="day6note.html">📘 学习记录 第6天</a></div>
<div class="record-item"><a href="day7note.html">📙 学习记录 第7天</a></div>
<div class="record-item"><a href="day8note.html">📗 学习记录 第8天</a></div>
<div class="record-item"><a href="day9note.html">📘 学习记录 第9天</a></div>

</div>

<div class="footer-note">日拱一卒 · 长期主义</div>
</div>

<script>
const items=[...document.querySelectorAll('.record-item')];
const container=document.getElementById('container');
const weeks={};

// 按周分组
items.forEach(item=>{
    const num=parseInt(item.innerText.match(/\d+/));
    const w=Math.ceil(num/7);
    if(!weeks[w])weeks[w]=[];
    weeks[w].push(item);
});

container.innerHTML='';
Object.keys(weeks).forEach(w=>{
    const wrap=document.createElement('div');
    wrap.className='week';
    wrap.innerHTML=
        `<div class="week-title">第 ${w} 周</div>
         <div class="records-list"></div>`;
    weeks[w].forEach(i=>wrap.querySelector('.records-list').appendChild(i));
    container.appendChild(wrap);
});

// 最新高亮
items[items.length-1].classList.add('latest');

// 搜索
search.oninput=e=>{
    const v=e.target.value;
    items.forEach(i=>{
        i.style.display=i.innerText.includes(v)?'':'none';
    });
};
</script>
</body>
</html>
