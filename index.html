<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日学习记录</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f1f5f9;
    padding: 24px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 15px 35px rgba(0,0,0,.08);
}

h1 {
    text-align: center;
    margin-bottom: 6px;
}

.stats {
    text-align: center;
    color: #475569;
    margin-bottom: 20px;
}

.search {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    margin-bottom: 18px;
    font-size: 15px;
}

.records {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
}

.record {
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    font-weight: 500;
    background: #f8fafc;
    color: #1e293b;
    text-decoration: none;
}

.record.today {
    background: #2563eb;
    color: #fff;
    border-color: #2563eb;
}

.record.missing {
    background: #e5e7eb;
    color: #94a3b8;
    pointer-events: none;
}

.heatmap {
    display: grid;
    grid-template-columns: repeat(53, 1fr);
    gap: 3px;
    margin: 30px 0;
}

.cell {
    width: 100%;
    padding-top: 100%;
    border-radius: 3px;
    background: #e5e7eb;
}

.cell.active {
    background: #22c55e;
}

.cell.today {
    outline: 2px solid #2563eb;
}
</style>
</head>

<body>
<div class="container">
<h1>📖 每日学习记录</h1>
<div class="stats" id="stats"></div>

<input class="search" placeholder="搜索第几天…" id="search">

<div class="heatmap" id="heatmap"></div>

<div class="records" id="records"></div>
</div>

<script>
const START_DATE = new Date('2025-05-05');
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

const recordsEl = document.getElementById('records');
const heatmapEl = document.getElementById('heatmap');
const statsEl = document.getElementById('stats');
const searchEl = document.getElementById('search');

const daysPassed = Math.floor((TODAY - START_DATE) / 86400000) + 1;

let existingDays = new Set();

function checkDay(day) {
    return fetch(`day${day}note.html`, { method: 'HEAD' })
        .then(r => r.ok)
        .catch(() => false);
}

async function init() {
    for (let i = 1; i <= daysPassed; i++) {
        if (await checkDay(i)) existingDays.add(i);
    }

    statsEl.textContent = `你已坚持 ${existingDays.size} 天`;

    for (let i = 1; i <= daysPassed; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (existingDays.has(i)) cell.classList.add('active');
        if (i === daysPassed) cell.classList.add('today');
        heatmapEl.appendChild(cell);
    }

    renderList('');
}

function renderList(keyword) {
    recordsEl.innerHTML = '';
    for (let i = daysPassed; i >= 1; i--) {
        if (keyword && !(`第${i}天`.includes(keyword))) continue;

        const a = document.createElement('a');
        a.textContent = `第 ${i} 天`;
        a.className = 'record';

        if (i === daysPassed) a.classList.add('today');
        if (!existingDays.has(i)) a.classList.add('missing');
        if (existingDays.has(i)) a.href = `day${i}note.html`;

        recordsEl.appendChild(a);
    }
}

searchEl.addEventListener('input', e => renderList(e.target.value));

init();
</script>
</body>
</html>
