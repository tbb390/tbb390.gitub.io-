<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的学习博客 · 每日记录</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(145deg, #edf2f7 0%, #e2e8f0 100%);
    font-family: 'Segoe UI', '微软雅黑', 'PingFang SC', system-ui, sans-serif;
    padding: 2rem 1.5rem;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.box {
    max-width: 900px;
    width: 100%;
    background: rgba(255, 255, 255, 0.98);
    padding: 2.5rem 2rem;
    border-radius: 2rem;
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
}

h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #1f4870, #2b5c8a);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
}

.info {
    text-align: center;
    margin: 1rem auto 1.5rem;
    color: #5b6e8c;
    font-size: 0.95rem;
    background: #f1f5f9;
    padding: 0.4rem 1.2rem;
    border-radius: 40px;
    display: inline-block;
}

.line {
    border-bottom: 2px dashed #e2edf2;
    margin: 1.5rem 0;
}

.search {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 999px;
    border: 1px solid #e2e8f0;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
}

.records-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
}

.record-item a {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.2rem;
    background: #ffffff;
    border-radius: 1.2rem;
    border: 1px solid #eef2ff;
    text-decoration: none;
    color: #1e2a3e;
    font-weight: 500;
    transition: all 0.2s ease;
}

.record-item a:hover {
    transform: translateY(-3px);
    border-color: #b9d0f0;
    box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.08);
}

.record-icon {
    font-size: 1.4rem;
    opacity: 0.7;
}

.record-text {
    flex: 1;
}

.footer-note {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.7rem;
    color: #8ba0bc;
    border-top: 1px solid #eef2ff;
    padding-top: 1rem;
}
</style>
</head>

<body>
<div class="box">
    <h1>📖 每日学习记录</h1>

    <div style="text-align:center;">
        <div class="info">编程 · 刷题 · 专业课 · 日常学习打卡记录</div>
    </div>

    <div class="line"></div>

    <input class="search" placeholder="搜索第几天…" oninput="filterRecords(this.value)">

    <div class="records-list" id="records"></div>

    <div class="footer-note">日拱一卒 · 持续更新</div>
</div>

<script>
const START_DATE = new Date('2025-05-05');
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

const maxDay = Math.floor((TODAY - START_DATE) / 86400000) + 1;
const records = document.getElementById('records');

async function exists(day) {
    try {
        const res = await fetch(`day${day}note.html`, { method: 'HEAD' });
        return res.ok;
    } catch {
        return false;
    }
}

async function init() {
    for (let i = maxDay; i >= 1; i--) {
        if (await exists(i)) {
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <a href="day${i}note.html">
                    <span class="record-icon">📘</span>
                    <span class="record-text">学习记录 第${i}天</span>
                </a>
            `;
            records.appendChild(div);
        }
    }
}

function filterRecords(keyword) {
    document.querySelectorAll('.record-item').forEach(item => {
        item.style.display = item.innerText.includes(keyword) ? '' : 'none';
    });
}

init();
</script>
</body>
</html>
